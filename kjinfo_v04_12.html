<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KJ INFO</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  background: #fff;
  color: #0d0d0d;
  font-size: 14px;
}
#container {
  max-width: 680px;
  margin: 0 auto;
  padding: 20px 20px 40px;
}
.msg-wrap {
  padding: 14px 0;
  border-bottom: 1px solid #f0f0f0;
}
.msg-wrap:last-child { border-bottom: none; }
.msg-sender {
  font-size: 11px;
  font-weight: 600;
  margin-bottom: 5px;
  color: #0d0d0d;
  letter-spacing: 0.03em;
}
.msg-sender.user-s { color: #888; }
.msg-text {
  line-height: 1.65;
  color: #0d0d0d;
  white-space: pre-wrap;
}
.msg-text.user-t { color: #333; }
.thumbs-row {
  display: flex;
  gap: 8px;
  margin-top: 10px;
  flex-wrap: wrap;
}
.t-img {
  width: 64px;
  height: 84px;
  object-fit: cover;
  border: 1px solid #e5e5e5;
  border-radius: 4px;
  cursor: pointer;
  transition: border-color 0.1s, transform 0.1s;
  display: block;
}
.t-img:hover { border-color: #0d0d0d; transform: translateY(-2px); }
.thinking-dots { display: flex; gap: 4px; align-items: center; padding: 4px 0; }
.thinking-dots span {
  width: 6px; height: 6px; background: #ccc; border-radius: 50%;
  animation: bounce 1.2s infinite;
}
.thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
.thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce {
  0%, 80%, 100% { transform: translateY(0); opacity: 0.5; }
  40% { transform: translateY(-4px); opacity: 1; }
}
#input-wrap { padding: 14px 0 0; }
#input-box {
  display: flex;
  gap: 8px;
  border: 1px solid #e0e0e0;
  border-radius: 10px;
  padding: 8px 12px;
  align-items: flex-end;
  box-shadow: 0 1px 4px rgba(0,0,0,0.05);
  transition: border-color 0.15s;
}
#input-box:focus-within { border-color: #0d0d0d; }
#user-input {
  flex: 1;
  font-size: 14px;
  border: none;
  outline: none;
  background: transparent;
  color: #0d0d0d;
  font-family: inherit;
  resize: none;
  max-height: 120px;
  min-height: 22px;
  line-height: 1.5;
}
#send-btn {
  background: #0d0d0d;
  color: #fff;
  border: none;
  border-radius: 6px;
  width: 28px;
  height: 28px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-size: 13px;
}
#send-btn:hover { background: #333; }
#send-btn:disabled { background: #e5e5e5; color: #aaa; cursor: not-allowed; }
#overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.45); z-index: 200;
  align-items: center; justify-content: center; padding: 20px;
}
#overlay.on { display: flex; }
#dbox {
  background: #fff; border-radius: 10px;
  max-width: 560px; width: 100%;
  display: flex; overflow: hidden;
  max-height: 85vh;
  box-shadow: 0 16px 48px rgba(0,0,0,0.18);
}
#dimg img { width: 240px; height: 100%; object-fit: cover; display: block; }
#dinfo { padding: 22px; flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
.d-id { font-size: 10px; color: #aaa; letter-spacing: 0.08em; text-transform: uppercase; }
.d-title { font-size: 16px; font-weight: 600; }
.d-row { display: flex; flex-direction: column; gap: 1px; }
.d-key { font-size: 10px; color: #aaa; text-transform: uppercase; letter-spacing: 0.06em; }
.d-val { font-size: 13px; color: #333; }
#d-close {
  font-size: 12px; background: none; border: 1px solid #e5e5e5;
  padding: 6px 14px; border-radius: 6px; cursor: pointer; color: #555;
  margin-top: auto; align-self: flex-start;
}
#d-close:hover { background: #f5f5f5; }
@media (max-width: 540px) {
  #dbox { flex-direction: column; }
  #dimg img { width: 100%; height: 180px; }
}
</style>
</head>
<body>
<div id="container">
  <div id="input-wrap">
    <div id="input-box">
      <textarea id="user-input" placeholder="Frage an KJ INFO …" rows="1"></textarea>
      <button id="send-btn" onclick="send()">&#x2191;</button>
    </div>
  </div>
</div>
<div id="overlay" onclick="overlayClick(event)">
  <div id="dbox">
    <div id="dimg"></div>
    <div id="dinfo"></div>
  </div>
</div>

  txt.textContent = text;
  if (extras && extras.thumbs) {
    const row = document.createElement("div");
    row.className = "thumbs-row";
    WORKS.forEach(function(w) {
      const img = document.createElement("img");
      img.src = IMAGES[w.image];
      img.className = "t-img";
      img.title = w.id + " · " + w.jahr;
      img.onclick = function() { showDetail(w); };
      row.appendChild(img);
    });
    txt.appendChild(row);
  }
  if (extras && extras.werk) {
    const w = extras.werk;
    const row = document.createElement("div");
    row.className = "thumbs-row";
    const img = document.createElement("img");
    img.src = IMAGES[w.image];
    img.className = "t-img";
    img.style.width = "80px";
    img.style.height = "104px";
    img.onclick = function() { showDetail(w); };
    row.appendChild(img);
    txt.appendChild(row);
  }
  wrap.appendChild(txt);
  container.insertBefore(wrap, inputWrap);
  window.scrollTo(0, document.body.scrollHeight);
  return wrap;
}

function addThinking() {
  const wrap = document.createElement("div");
  wrap.className = "msg-wrap";
  const sender = document.createElement("div");
  sender.className = "msg-sender";
  sender.textContent = "KJ INFO";
  const dots = document.createElement("div");
  dots.className = "thinking-dots";
  dots.innerHTML = "<span></span><span></span><span></span>";
  wrap.appendChild(sender);
  wrap.appendChild(dots);
  container.insertBefore(wrap, inputWrap);
  window.scrollTo(0, document.body.scrollHeight);
  return wrap;
}

async function send() {
  if (loading) return;
  const inp = document.getElementById("user-input");
  const text = inp.value.trim();
  if (!text) return;
  inp.value = "";
  inp.style.height = "auto";
  setLoading(true);
  addMsg(text, "user");
  history.push({ role: "user", content: text });
  const thinking = addThinking();
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": API_KEY,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true"
      },
      body: JSON.stringify({
        model: "claude-haiku-4-5-20251001",
        max_tokens: 800,
        system: SYSTEM,
        messages: history
      })
    });
    const data = await res.json();
    thinking.remove();
    if (data.error) {
      addMsg("Fehler: " + data.error.message, "assistant");
    } else {
      let reply = data.content && data.content[0] ? data.content[0].text : "";
      history.push({ role: "assistant", content: reply });
      const extras = {};
      if (reply.indexOf("[ARCHIV]") !== -1) {
        reply = reply.replace("[ARCHIV]", "").trim();
        extras.thumbs = true;
      }
      const wm = reply.match(/\[WERK:(\d+)\]/);
      if (wm) {
        reply = reply.replace(wm[0], "").trim();
        const w = WORKS.find(function(x) { return x.image === wm[1] + ".jpg"; });
        if (w) extras.werk = w;
      }
      addMsg(reply, "assistant", extras);
    }
  } catch(e) {
    thinking.remove();
    addMsg("Verbindungsfehler: " + e.message, "assistant");
  }
  setLoading(false);
}

function setLoading(v) {
  loading = v;
  document.getElementById("send-btn").disabled = v;
  document.getElementById("user-input").disabled = v;
  if (!v) document.getElementById("user-input").focus();
}

document.getElementById("user-input").addEventListener("keydown", function(e) {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
});

document.getElementById("user-input").addEventListener("input", function() {
  this.style.height = "auto";
  this.style.height = Math.min(this.scrollHeight, 120) + "px";
});

function showDetail(w) {
  document.getElementById("dimg").innerHTML = "<img src=\"" + IMAGES[w.image] + "\" alt=\"" + w.id + "\">";
  document.getElementById("dinfo").innerHTML =
    "<div class=\"d-id\">" + w.id + "</div>" +
    "<div class=\"d-title\">" + w.titel + "</div>" +
    "<div class=\"d-row\"><div class=\"d-key\">Jahr</div><div class=\"d-val\">" + w.jahr + "</div></div>" +
    "<div class=\"d-row\"><div class=\"d-key\">Medium</div><div class=\"d-val\">" + w.medium + "</div></div>" +
    "<div class=\"d-row\"><div class=\"d-key\">Größe</div><div class=\"d-val\">" + w.groesse + "</div></div>" +
    "<div class=\"d-row\"><div class=\"d-key\">Struktur</div><div class=\"d-val\">" + w.struktur + "</div></div>" +
    "<button id=\"d-close\" onclick=\"closeDetail()\">Schließen</button>";
  document.getElementById("overlay").classList.add("on");
}

function closeDetail() {
  document.getElementById("overlay").classList.remove("on");
}

function overlayClick(e) {
  if (e.target === document.getElementById("overlay")) closeDetail();
}

addMsg("KJ INFO 0.4 — Corpus: CV, Werkverzeichnis (Prototyp), Katalogtexte 2015 / 2022\nKJ INFO ist betriebsbereit.", "assistant");
</script>

<div id="key-screen" style="display:none; max-width:480px; margin:80px auto; padding:0 20px; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;">
  <p style="font-size:13px; font-weight:600; margin-bottom:8px; letter-spacing:0.05em;">KJ INFO — API Key</p>
  <p style="font-size:12px; color:#888; margin-bottom:12px; line-height:1.5;">Gib deinen Anthropic API Key ein. Er wird nur in diesem Browser gespeichert.</p>
  <input type="password" id="key-input" placeholder="sk-ant-..." style="font-family:monospace; font-size:12px; border:1px solid #e0e0e0; border-radius:8px; padding:10px 12px; outline:none; width:100%; margin-bottom:8px;" />
  <p id="key-error" style="font-size:12px; color:#c00; display:none; margin-bottom:8px;">Ungültiger Key.</p>
  <button onclick="startWithKey()" style="background:#0d0d0d; color:#fff; border:none; border-radius:8px; padding:10px; cursor:pointer; font-size:13px; width:100%;">Starten</button>
</div>

<script>
(function() {
  var saved = localStorage.getItem("kjinfo_key");
  if (!saved || !saved.startsWith("sk-ant-")) {
    document.getElementById("key-screen").style.display = "block";
    document.getElementById("container").style.display = "none";
  }
  document.getElementById("key-input").addEventListener("keydown", function(e) {
    if (e.key === "Enter") startWithKey();
  });
})();

function startWithKey() {
  var k = document.getElementById("key-input").value.trim();
  if (!k.startsWith("sk-ant-")) {
    document.getElementById("key-error").style.display = "block";
    return;
  }
  localStorage.setItem("kjinfo_key", k);
  API_KEY = k;
  document.getElementById("key-screen").style.display = "none";
  document.getElementById("container").style.display = "block";
}
</script>
